    ctx.fillStyle='#1a1a28';ctx.fillRect(bx+s*.29,lly,s*.2,s*.22);ctx.fillRect(bx+s*.52,rly,s*.2,s*.22);
    ctx.fillStyle='#111118';ctx.fillRect(bx+s*.29,lly,s*.2,3);ctx.fillRect(bx+s*.52,rly,s*.2,3);

    ctx.fillStyle='#111';ctx.fillRect(bx+s*.76+camSwing,by+s*.48,9,7);
    ctx.fillStyle='#333';ctx.fillRect(bx+s*.78+camSwing,by+s*.49,5,5);
    ctx.fillStyle='rgba(100,160,255,0.6)';ctx.fillRect(bx+s*.79+camSwing,by+s*.5,3,3);
    // Head — well-groomed, professional
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(bx+s*.26,by+s*.08,s*.48,s*.3);
    ctx.fillStyle='#C68642';ctx.fillRect(bx+s*.28,by+s*.1,s*.44,s*.27);
    ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(bx+s*.5,by+s*.1,s*.22,s*.27);
    // Backwards baseball cap — brim on LEFT (rear) for right-facing character
    ctx.fillStyle='#1a2a4a';ctx.fillRect(bx+s*.24,by+s*.05,s*.52,9);
    ctx.fillStyle='#0f1f38';ctx.fillRect(bx+s*.24,by+s*.05,s*.52,3);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(bx+s*.5,by+s*.05,s*.2,3); // logo on front (right)
    ctx.fillStyle='#0f1f38';ctx.fillRect(bx+s*.16,by+s*.07,s*.14,5); // brim LEFT = backward
    // Short well-groomed beard
    ctx.fillStyle='#2a1808';
    ctx.fillRect(bx+s*.29,by+s*.28,s*.42,s*.08);
    ctx.fillRect(bx+s*.29,by+s*.2,3,s*.16);
    ctx.fillRect(bx+s*.58,by+s*.2,3,s*.16);
    ctx.fillRect(bx+s*.4,by+s*.29,s*.2,s*.05);
    ctx.fillStyle='rgba(40,20,5,0.4)';ctx.fillRect(bx+s*.3,by+s*.26,s*.4,4);
    // Eyes — warm brown, confident

  // ─── TACT: drone nerd, sausage & seafood boil enthusiast ───────────────
  else if(cls==='tact'){
    // Legs — khaki pants, slim
    const lly=by+s*.72+(isWalking?-footSwing:0),rly=by+s*.72+(isWalking?footSwing:0);
    ctx.fillStyle='#B8A878';ctx.fillRect(bx+s*.3,lly,s*.17,s*.22);ctx.fillRect(bx+s*.54,rly,s*.17,s*.22);
    ctx.fillStyle='#A09060';ctx.fillRect(bx+s*.3,lly,s*.17,3);ctx.fillRect(bx+s*.54,rly,s*.17,3);
    // Body — green polo, slim fit

const AUD = {
  _ctx:null, _mGain:null, _sfxGain:null, _musicGain:null,
  _music:null, _musicType:null, _osc:[], enabled:true, sfxVol:0.7, musicVol:0.35,

  ctx(){
    if(!this._ctx){
      this._ctx=new(window.AudioContext||window.webkitAudioContext)();
      this._mGain=this._ctx.createGain(); this._mGain.gain.value=1; this._mGain.connect(this._ctx.destination);
      this._sfxGain=this._ctx.createGain(); this._sfxGain.gain.value=this.sfxVol; this._sfxGain.connect(this._mGain);
      this._musicGain=this._ctx.createGain(); this._musicGain.gain.value=this.musicVol; this._musicGain.connect(this._mGain);
    }
    if(this._ctx.state==='suspended')this._ctx.resume();
    return this._ctx;
  },

  // ── Sound effects ─────────────────────────────────────────────────────────
  play(type){
    if(!this.enabled)return;
    try{const c=this.ctx(),g=c.createGain(),t=c.currentTime;g.connect(this._sfxGain);
    const sfx={
      hit:()=>{const o=c.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(80,t+0.08);g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(g);o.start(t);o.stop(t+0.1);},
      playerHit:()=>{const o=c.createOscillator();o.type='square';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(60,t+0.15);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.connect(g);o.start(t);o.stop(t+0.2);},
      death:()=>{const o=c.createOscillator();o.type='triangle';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(30,t+0.4);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);o.start(t);o.stop(t+0.45);},
      pickup:()=>{const o=c.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1320,t+0.05);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.connect(g);o.start(t);o.stop(t+0.18);},
      levelup:()=>{[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator();o.type='sine';o.frequency.value=f;const lg=c.createGain();lg.gain.setValueAtTime(0.3,t+i*0.08);lg.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.15);o.connect(lg);lg.connect(this._sfxGain);o.start(t+i*0.08);o.stop(t+i*0.08+0.18);});},
      questDone:()=>{[392,523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator();o.type='triangle';o.frequency.value=f;const lg=c.createGain();lg.gain.setValueAtTime(0.35,t+i*0.1);lg.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.2);o.connect(lg);lg.connect(this._sfxGain);o.start(t+i*0.1);o.stop(t+i*0.1+0.22);});},
      stairs:()=>{const o=c.createOscillator();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(200,t+0.3);const o2=c.createOscillator();o2.type='sine';o2.frequency.setValueAtTime(600,t+0.05);o2.frequency.linearRampToValueAtTime(300,t+0.35);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);o2.connect(g);o.start(t);o2.start(t+0.05);o.stop(t+0.4);o2.stop(t+0.4);},
      skill:()=>{const o=c.createOscillator();o.type='square';o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(110,t+0.18);const o2=c.createOscillator();o2.type='sine';o2.frequency.setValueAtTime(880,t);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);o2.connect(g);o.start(t);o2.start(t);o.stop(t+0.2);o2.stop(t+0.2);},
      click:()=>{const o=c.createOscillator();o.type='sine';o.frequency.value=1200;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);o.connect(g);o.start(t);o.stop(t+0.05);},
      chest:()=>{[523,784,1047,1568].forEach((f,i)=>{const o=c.createOscillator();o.type='triangle';o.frequency.value=f;const lg=c.createGain();lg.gain.setValueAtTime(0.28,t+i*0.07);lg.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.18);o.connect(lg);lg.connect(this._sfxGain);o.start(t+i*0.07);o.stop(t+i*0.07+0.2);});},
      talk:()=>{const o=c.createOscillator();o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(550,t+0.04);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(g);o.start(t);o.stop(t+0.12);},
    };
    if(sfx[type])sfx[type]();}catch(e){}
  },

  // ── Procedural dungeon music ──────────────────────────────────────────────
  playMusic(type){
    if(!this.enabled||this._musicType===type)return;
    this.stopMusic();
    try{const c=this.ctx();this._musicType=type;this._osc=[];
    const nodes=[];
    if(type==='explore'){
      // Dark ambient: two slow drones + filtered noise + occasional melodic notes
      const drone1=c.createOscillator();drone1.type='sine';drone1.frequency.value=55;
      const drone2=c.createOscillator();drone2.type='sine';drone2.frequency.value=82.4;
      const drone3=c.createOscillator();drone3.type='triangle';drone3.frequency.value=110;
      const dg1=c.createGain();dg1.gain.value=0.18;
      const dg2=c.createGain();dg2.gain.value=0.12;
      const dg3=c.createGain();dg3.gain.value=0.06;
      // Slow LFO modulation on drone 3
      const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.08;
      const lfoG=c.createGain();lfoG.gain.value=0.04;
      lfo.connect(lfoG);lfoG.connect(dg3.gain);
      drone1.connect(dg1);drone2.connect(dg2);drone3.connect(dg3);
      dg1.connect(this._musicGain);dg2.connect(this._musicGain);dg3.connect(this._musicGain);
      drone1.start();drone2.start();drone3.start();lfo.start();
      this._osc=[drone1,drone2,drone3,lfo];

      // Sparse melodic notes — pentatonic minor pattern
      const melody=[220,261,311,349,440,523];
      let noteIdx=0;
      const scheduleNote=()=>{
        if(this._musicType!=='explore')return;
        try{const nc=this.ctx();const no=nc.createOscillator();no.type='triangle';
        no.frequency.value=melody[noteIdx%melody.length];noteIdx++;
        const ng=nc.createGain();const t=nc.currentTime;
        ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(0.07,t+0.3);
        ng.gain.linearRampToValueAtTime(0,t+1.8);
        no.connect(ng);ng.connect(this._musicGain);no.start(t);no.stop(t+2);
        const delay=rnd(3000,8000);this._melodyTimer=setTimeout(scheduleNote,delay);}catch(e){}
      };
      this._melodyTimer=setTimeout(scheduleNote,2000);

    }else if(type==='combat'){
      // Tense: faster pulse + dissonant tones
      const pulse=c.createOscillator();pulse.type='square';pulse.frequency.value=55;
      const pg=c.createGain();pg.gain.value=0.12;
      const lfo2=c.createOscillator();lfo2.type='square';lfo2.frequency.value=4;
      const lg2=c.createGain();lg2.gain.value=0.08;
      lfo2.connect(lg2);lg2.connect(pg.gain);
      const t2=c.createOscillator();t2.type='sawtooth';t2.frequency.value=73.4;
      const tg2=c.createGain();tg2.gain.value=0.08;
      pulse.connect(pg);t2.connect(tg2);pg.connect(this._musicGain);tg2.connect(this._musicGain);
      pulse.start();t2.start();lfo2.start();
      this._osc=[pulse,t2,lfo2];

    }else if(type==='boss'){
      // Dramatic: deep pulse + higher tension drones
      const bp=c.createOscillator();bp.type='sawtooth';bp.frequency.value=41.2;
      const bg=c.createGain();bg.gain.value=0.15;
      const lfoB=c.createOscillator();lfoB.type='square';lfoB.frequency.value=2;
      const lgB=c.createGain();lgB.gain.value=0.12;
      lfoB.connect(lgB);lgB.connect(bg.gain);
      const h=c.createOscillator();h.type='triangle';h.frequency.value=164.8;
      const hg=c.createGain();hg.gain.value=0.09;
      bp.connect(bg);h.connect(hg);bg.connect(this._musicGain);hg.connect(this._musicGain);
      bp.start();h.start();lfoB.start();
      this._osc=[bp,h,lfoB];

    }else if(type==='merchant'){
      // Lighter: higher drones, pleasant
      const m1=c.createOscillator();m1.type='sine';m1.frequency.value=220;
      const m2=c.createOscillator();m2.type='triangle';m2.frequency.value=330;
      const mg1=c.createGain();mg1.gain.value=0.1;const mg2=c.createGain();mg2.gain.value=0.08;
      m1.connect(mg1);m2.connect(mg2);mg1.connect(this._musicGain);mg2.connect(this._musicGain);
      m1.start();m2.start();this._osc=[m1,m2];
    }}catch(e){console.warn('Music error:',e);}
  },

  stopMusic(){
    clearTimeout(this._melodyTimer);
    this._osc.forEach(o=>{try{o.stop();}catch(e){}});
    this._osc=[];this._musicType=null;
  },

  // ── NPC Voice (Web Speech API) ────────────────────────────────────────────
  _voices:[],
  loadVoices(){
    this._voices=window.speechSynthesis?.getVoices()||[];
    if(!this._voices.length)setTimeout(()=>this._voices=window.speechSynthesis?.getVoices()||[],500);
  },
  // Voice priority list — browser TTS quality varies wildly by platform
  // We rank voices from best to worst available

};

function drawLargeMap(ctx,dg,pos,floor){
  const PAD=12;
  const mw=canvasW-PAD*2,mh=canvasH-PAD*2;
  const mx=PAD,my=PAD;
  ctx.fillStyle='rgba(3,3,10,0.94)';
  ctx.fillRect(0,0,canvasW,canvasH);
  ctx.strokeStyle='#2a2a55';ctx.lineWidth=1.5;
  ctx.strokeRect(mx,my,mw,mh);
  const sx=mw/DW,sy=mh/DH;
  for(let y=0;y<DH;y++)for(let x=0;x<DW;x++){
    const v=dg.vis[y][x];if(v===V.DARK)continue;
    const t=dg.tiles[y][x],lit=v===V.LIT;
    if(t===T.WALL)ctx.fillStyle=lit?'#1c1c3a':'#0e0e1e';
    else ctx.fillStyle=lit?'#28284e':'#161630';
    ctx.fillRect(mx+x*sx,my+y*sy,Math.max(1,sx-.3),Math.max(1,sy-.3));
    if(lit){
      if(t===T.STAIRS){const g=ctx.createRadialGradient(mx+x*sx+sx/2,my+y*sy+sy/2,0,mx+x*sx+sx/2,my+y*sy+sy/2,sx*2);g.addColorStop(0,'#00CFFF');g.addColorStop(1,'rgba(0,150,255,0)');ctx.fillStyle=g;ctx.fillRect(mx+x*sx-sx,my+y*sy-sy,sx*3,sy*3);ctx.fillStyle='#00EFFF';ctx.fillRect(mx+x*sx,my+y*sy,sx,sy);}
      if(t===T.CHEST){ctx.fillStyle='#FF9900';ctx.fillRect(mx+x*sx,my+y*sy,sx,sy);}
      if(t===T.MERCHANT){ctx.fillStyle='#FFD700';ctx.fillRect(mx+x*sx,my+y*sy,sx,sy);}
    }
  }
  dg.items.forEach(it=>{
    if(dg.vis[it.y]?.[it.x]!==V.LIT)return;
    ctx.fillStyle=it.rc||'#aaa';
    ctx.fillRect(mx+it.x*sx,my+it.y*sy,Math.max(2,sx),Math.max(2,sy));
  });
  dg.enemies.forEach(e=>{
    if(e.hp<=0||dg.vis[e.y]?.[e.x]!==V.LIT)return;
    ctx.fillStyle=e.boss?'#FF1144':'#FF3344';
    const ex=mx+e.x*sx,ey=my+e.y*sy;
    ctx.fillRect(ex-1,ey-1,sx+2,sy+2);
    if(e.boss){ctx.strokeStyle='#FF1144';ctx.lineWidth=1;ctx.strokeRect(ex-2,ey-2,sx+4,sy+4);}
  });
  const px=mx+pos.x*sx,py=my+pos.y*sy;
  const pg=ctx.createRadialGradient(px+sx/2,py+sy/2,0,px+sx/2,py+sy/2,sx*3);
  pg.addColorStop(0,'rgba(255,240,60,0.4)');pg.addColorStop(1,'rgba(255,200,0,0)');
  ctx.fillStyle=pg;ctx.fillRect(px-sx*2,py-sy*2,sx*5,sy*5);
  ctx.fillStyle='#FFE040';ctx.fillRect(px-1,py-1,sx+2,sy+2);
  ctx.fillStyle='#FFF';ctx.fillRect(px,py,Math.max(2,sx*.6),Math.max(2,sy*.6));
  ctx.font='bold 13px monospace';ctx.fillStyle='#4a4a88';ctx.textAlign='center';
  ctx.fillText(`FLOOR ${floor} — DUNGEON MAP   [M to close]`,canvasW/2,my-3);
  const legend=[['#FFE040','You'],['#FF3344','Enemy'],['#FF1144','Boss'],['#00EFFF','Stairs'],['#FF9900','Chest'],['#FFD700','Shop']];
  let lx=mx;
  legend.forEach(([col,label])=>{
    ctx.fillStyle=col;ctx.fillRect(lx,my+mh+4,10,10);
    ctx.fillStyle='#666';ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText(label,lx+13,my+mh+13);lx+=label.length*7+22;
  });

  const jCtx=jCanvas.getContext('2d');
  jCtx.clearRect(0,0,JW,JH);

  // Subtle direction dots
  jCtx.fillStyle='rgba(80,90,180,0.20)';

    jCtx.beginPath();jCtx.arc(jCx+dx*(JSIZE/2-13),jCy+dy*(JSIZE/2-13),6,0,Math.PI*2);jCtx.fill();

  tg.addColorStop(0,jActive?'rgba(150,170,255,0.95)':'rgba(90,100,200,0.90)');
  tg.addColorStop(1,jActive?'rgba(50,70,210,0.88)':'rgba(30,40,120,0.80)');

  jCtx.fillStyle=tg;jCtx.fill();
  jCtx.strokeStyle=jActive?'rgba(180,200,255,0.85)':'rgba(100,120,220,0.55)';
  jCtx.lineWidth=1.5;jCtx.stroke();

function getDir(ox,oy){
  const d=Math.sqrt(ox*ox+oy*oy);
  if(d<JMAX*JDEAD)return{dx:0,dy:0};
  return Math.abs(ox)>=Math.abs(oy)?{dx:ox>0?1:-1,dy:0}:{dx:0,dy:oy>0?1:-1};

  const oy=Math.max(-JMAX,Math.min(JMAX,(e.clientY-r.top)-jCy));

  e.preventDefault();
  const r=jCanvas.getBoundingClientRect();
  const rawX=(e.clientX-r.left)-jCx, rawY=(e.clientY-r.top)-jCy;
  const dist=Math.sqrt(rawX*rawX+rawY*rawY);
  const scale=Math.min(1,JMAX/Math.max(dist,1));
  const ox=rawX*scale, oy=rawY*scale;
  thumbX=jCx+ox; thumbY=jCy+oy;
  const{dx,dy}=getDir(ox,oy);
  if(dx!==JOY.dx||dy!==JOY.dy){
    if(dx===0&&dy===0){joyStop();}
    else{joyStart(dx,dy);}
  }
  drawJoystick();
});

const jRelease=()=>{jActive=false;thumbX=jCx;thumbY=jCy;joyStop();drawJoystick();};
jCanvas.addEventListener('pointerup',jRelease);
jCanvas.addEventListener('pointercancel',jRelease);

// Movement — uses global JOY state so intervals survive re-renders
function getDirection(ox,oy){
  const dist=Math.sqrt(ox*ox+oy*oy);
  if(dist<JMAX*JDEAD)return{dx:0,dy:0};
  return Math.abs(ox)>=Math.abs(oy)?{dx:ox>0?1:-1,dy:0}:{dx:0,dy:oy>0?1:-1};
}

// Stop any old timer from previous render
joyStop();

jCanvas.addEventListener('pointerdown',e=>{
  e.preventDefault();e.stopPropagation();
  jActive=true;
  const r=jCanvas.getBoundingClientRect();
  const ox=Math.max(-JMAX,Math.min(JMAX,(e.clientX-r.left)-jCx));
  const oy=Math.max(-JMAX,Math.min(JMAX,(e.clientY-r.top)-jCy));
  thumbX=jCx+ox;thumbY=jCy+oy;
  const{dx,dy}=getDirection(ox,oy);
  joyStart(dx,dy);
  drawJoystick();
});

jCanvas.addEventListener('pointermove',e=>{
  if(!jActive)return;
  e.preventDefault();
  const r=jCanvas.getBoundingClientRect();
  const rawX=(e.clientX-r.left)-jCx,rawY=(e.clientY-r.top)-jCy;
  const dist=Math.sqrt(rawX*rawX+rawY*rawY);
  const scale=Math.min(1,JMAX/Math.max(dist,1));
  const ox=rawX*scale,oy=rawY*scale;
  thumbX=jCx+ox;thumbY=jCy+oy;
  const{dx,dy}=getDirection(ox,oy);
  if(dx!==JOY.dx||dy!==JOY.dy){
    if(dx===0&&dy===0){joyStop();}
    else{joyStart(dx,dy);}
  }
  drawJoystick();
});

      if(pb.execBonus){const ep=document.createElement('div');ep.style.cssText=`font-size:10px;background:#1e1030;border:1px solid #6644aa;border-radius:6px;padding:5px 11px;color:#cc99ff;font-weight:bold;`;ep.textContent='Death Mark';pills.appendChild(ep);}
      if(p.goldMult>1){const gp=document.createElement('div');gp.style.cssText=`font-size:10px;background:#1e1600;border:1px solid ${C.gold};border-radius:6px;padding:5px 11px;color:${C.goldBright};font-weight:bold;`;gp.textContent=`Gold ×${p.goldMult.toFixed(1)}`;pills.appendChild(gp);}
      scr.appendChild(pills);
    }else{
      const no=document.createElement('div');
      no.style.cssText=`color:${C.textMuted};font-size:11px;`;
      no.textContent='No talents yet — level up to gain passive abilities.';scr.appendChild(no);
    }
    body.appendChild(scr);
  }

  div.appendChild(body);root.appendChild(div);
}

function renderMerchant(root,st){const{p,dg}=st;const div=document.createElement('div');div.style.cssText='display:flex;flex-direction:column;height:100%;background:#07030a;';const hdr=document.createElement('div');hdr.style.cssText='padding:10px 14px;background:#0a0512;border-bottom:1px solid #2a1a2a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';hdr.innerHTML=`<div><div style="color:#FFD700;font-weight:bold;font-size:15px;">THE WANDERING MERCHANT</div><div style="color:#664444;font-size:9px;margin-top:2px;">"Finest wares in the dungeon."</div></div><div style="text-align:right;"><div style="color:#FFD700;font-size:14px;font-weight:bold;">${p.gold}g</div></div>`;const closeBtn=document.createElement('button');closeBtn.textContent='LEAVE';closeBtn.style.cssText='display:block;margin-top:4px;background:none;border:1px solid #444;border-radius:5px;color:#888;padding:3px 8px;cursor:pointer;font-family:monospace;font-size:10px;';closeBtn.addEventListener('click',()=>dispatch({type:'CLOSE_MERCHANT'}));hdr.querySelector('div:last-child').appendChild(closeBtn);div.appendChild(hdr);const body=document.createElement('div');body.style.cssText='flex:1;overflow-y:auto;padding:10px;';body.innerHTML+='<div style="font-size:10px;color:#664444;margin-bottom:8px;letter-spacing:1px;">FOR SALE</div>';if(!dg.merchantInv?.length){body.innerHTML+='<div style="color:#333;font-size:11px;">Sold out!</div>';}(dg.merchantInv||[]).forEach((it,i)=>{const cost=Math.round((it.val||20)*2);const canAfford=p.gold>=cost;const card=document.createElement('div');card.style.cssText=`padding:8px 10px;margin-bottom:7px;border-radius:6px;background:#110a0a;border:1px solid ${it.rc}44;display:flex;justify-content:space-between;align-items:center;`;const sl=[it.atk?`ATK+${it.atk}`:null,it.def?`DEF+${it.def}`:null,it.mgk?`MGK+${it.mgk}`:null,it.mhp?`MaxHP+${it.mhp}`:null,it.hp?`Heals ${it.hp}`:null].filter(Boolean).join(' ');card.innerHTML=`<div style="flex:1;min-width:0;"><div style="font-size:11px;color:${it.rc};font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.dn}</div><div style="font-size:10px;color:#111;margin-top:2px;font-weight:600;">${it.rn} ${it.type}${sl?' - '+sl:''}</div></div><button style="padding:5px 8px;border:none;border-radius:5px;background:${canAfford?'#4A3010':'#1a1a1a'};color:${canAfford?'#FFD700':'#444'};font-size:10px;cursor:${canAfford?'pointer':'default'};font-family:monospace;margin-left:8px;white-space:nowrap;">${cost}g</button>`;card.querySelector('button').addEventListener('click',()=>{if(canAfford)dispatch({type:'BUY',i});});body.appendChild(card);});body.innerHTML+='<div style="font-size:10px;color:#664444;margin:12px 0 8px;letter-spacing:1px;border-top:1px solid #1a1a30;padding-top:10px;">SELL ITEMS</div>';if(!p.inv.length)body.innerHTML+='<div style="color:#333;font-size:11px;">Nothing to sell</div>';p.inv.forEach((it,i)=>{const val=Math.max(1,Math.round((it.val||10)/2));const card=document.createElement('div');card.style.cssText='padding:7px 10px;margin-bottom:5px;border-radius:6px;background:#0a0a0a;border:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;';card.innerHTML=`<div style="flex:1;min-width:0;font-size:10px;color:${it.rc||'#AAA'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.dn}</div><button style="padding:4px 7px;border:none;border-radius:4px;background:#1E3A1E;color:#6aaa6a;font-size:10px;cursor:pointer;font-family:monospace;margin-left:8px;white-space:nowrap;">+${val}g</button>`;card.querySelector('button').addEventListener('click',()=>dispatch({type:'SELL',i}));body.appendChild(card);});div.appendChild(body);root.appendChild(div);}
function renderTalent(root,st){const talents=st.pendingTalents||pickTalents();const div=document.createElement('div');div.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;background:#030312;';div.innerHTML=`<div style="font-size:10px;color:#444;letter-spacing:3px;margin-bottom:10px;">LEVEL UP</div><div style="font-size:22px;color:#FFD700;font-weight:bold;margin-bottom:6px;">Level ${st.p.lv}!</div><div style="font-size:12px;color:#888;margin-bottom:22px;">Choose a talent:</div>`;talents.forEach(t=>{const btn=document.createElement('div');btn.style.cssText='width:100%;max-width:300px;padding:14px 16px;margin-bottom:10px;border-radius:8px;background:#0e0e24;border:1px solid #2a2a55;cursor:pointer;';btn.innerHTML=`<div style="font-size:14px;color:#DDAAFF;font-weight:bold;margin-bottom:4px;">${t.n}</div><div style="font-size:11px;color:#778;line-height:1.5;">${t.d}</div>`;btn.addEventListener('click',()=>dispatch({type:'PICK_TALENT',talent:t}));btn.addEventListener('mouseenter',()=>{btn.style.background='#161640';btn.style.borderColor='#5555AA';});btn.addEventListener('mouseleave',()=>{btn.style.background='#0e0e24';btn.style.borderColor='#2a2a55';});div.appendChild(btn);});root.appendChild(div);}
function renderStairs(root,st){
  const div=document.createElement('div');
  div.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:rgba(4,4,16,0.96);color:#ddd;padding:28px;';
  div.innerHTML=`
    <div style="font-size:44px;margin-bottom:14px;">🌀</div>
    <div style="font-size:20px;color:#00CFFF;font-weight:bold;margin-bottom:8px;">DESCEND?</div>
    <div style="font-size:13px;color:#778;text-align:center;margin-bottom:6px;">Floor ${st.floor} → Floor ${st.floor+1}</div>
    <div style="font-size:11px;color:#556;text-align:center;margin-bottom:28px;">
      ${st.dg.isBossFloor?'<span style="color:#FF4444;">⚠ A powerful boss awaits below!</span>':'The dungeon grows deeper and more dangerous.'}
    </div>
    <div style="display:flex;gap:14px;">
      <button id="btn-ascend" style="padding:13px 32px;background:#003a6a;border:2px solid #00CFFF;border-radius:10px;color:#00CFFF;font-size:15px;font-weight:bold;cursor:pointer;font-family:monospace;">DESCEND ▼</button>
      <button id="btn-stay"   style="padding:13px 32px;background:#1a1a0a;border:2px solid #888;border-radius:10px;color:#aaa;font-size:15px;font-weight:bold;cursor:pointer;font-family:monospace;">STAY ✕</button>
    </div>
    <div style="font-size:10px;color:#333;margin-top:18px;">HP: ${st.p.hp}/${(()=>{const s=calcStats(st.p);return s.mhp;})()} · Floor ${st.floor} · Lv.${st.p.lv}</div>`;
  root.appendChild(div);
  div.querySelector('#btn-ascend').addEventListener('click',()=>dispatch({type:'ASCEND'}));
  div.querySelector('#btn-stay').addEventListener('click',()=>{GS={...GS,scr:S.GAME};render();});
}

function renderDeath(root,st){const{p,floor,log}=st;const div=document.createElement('div');div.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#0a0005;padding:24px;';div.innerHTML=`<div style="font-size:50px;margin-bottom:10px;opacity:.8;">X</div><div style="font-size:24px;color:#CC0000;font-weight:bold;margin-bottom:7px;letter-spacing:2px;">YOU DIED</div><div style="font-size:12px;color:#666;margin-bottom:6px;">${p.name} the ${CLS[p.cls].n} fell on floor ${floor}</div><div style="font-size:11px;color:#444;margin-bottom:18px;">Level ${p.lv} | ${p.xp} XP | ${p.gold} gold</div><div style="max-width:280px;font-size:9px;color:#333;text-align:center;line-height:1.8;margin-bottom:24px;border:1px solid #1a0010;border-radius:7px;padding:10px;">${log.slice(0,5).join('<br>')}</div><button id="retry" style="padding:11px 32px;background:#CC0000;border:none;border-radius:7px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;font-family:monospace;">TRY AGAIN</button>`;root.appendChild(div);div.querySelector('#retry').addEventListener('click',()=>dispatch({type:'RESTART'}));}
document.addEventListener('keydown',e=>{if(document.activeElement&&document.activeElement.tagName==='INPUT')return;const km={ArrowUp:{type:'MOVE',dx:0,dy:-1},ArrowDown:{type:'MOVE',dx:0,dy:1},ArrowLeft:{type:'MOVE',dx:-1,dy:0},ArrowRight:{type:'MOVE',dx:1,dy:0},w:{type:'MOVE',dx:0,dy:-1},s:{type:'MOVE',dx:0,dy:1},a:{type:'MOVE',dx:-1,dy:0},d:{type:'MOVE',dx:1,dy:0},q:{type:'SKILL'},i:{type:'TOGGLE_INV'},e:{type:'TALK_ADJ'},' ':{type:'MOVE',dx:0,dy:0},z:{type:'MOVE',dx:0,dy:0},Enter:{type:'DISMISS'}};const act=km[e.key];if(act){e.preventDefault();dispatch(act);}if(e.key==='m'||e.key==='M'){e.preventDefault();showMap=!showMap;}});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
setInterval(()=>{if(GS.scr===S.GAME)dispatch({type:'ENEMY_TICK'});},400);
(function flickerLoop(){
  if(GS.scr===S.GAME&&canvasW>0&&canvas.parentNode){
    const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
    drawGame(ctx,GS);
    if(showMap)drawLargeMap(ctx,GS.dg,GS.pos,GS.floor);
  }
  requestAnimationFrame(flickerLoop);
})();
render();
</script></body></html>
